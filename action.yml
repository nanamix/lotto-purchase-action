name: 'lotto-purchase-action'
description: '동행복권 로또 6/45 자동 구매를 위한 GitHub Action. 자동/수동 구매 및 커스텀 워크플로우를 지원합니다.'
branding:
  icon: 'award'
  color: 'green'
author: 'kkd927 <kkd927@gmail.com>'
inputs:
  dhlottery-id:
    required: false
    description: '동행복권 로그인 아이디. 구매 실행 시 필요하며 check-winning-only에서는 사용하지 않습니다.'
    default: ''
  dhlottery-password:
    required: false
    description: '동행복권 로그인 비밀번호. 구매 실행 시 필요하며 check-winning-only에서는 사용하지 않습니다.'
    default: ''
  github-token:
    required: false
    description: 'GitHub 이슈 관리를 위한 토큰. workflow에서는 github.token 컨텍스트나 GITHUB_TOKEN 전달을 권장합니다.'
    default: ''
  game-count:
    required: false
    description: '자동 구매 게임 수 (1-5, 기본값: 5)'
    default: '5'
  workflow-file:
    required: false
    description: '커스텀 워크플로우 스크립트 경로. 체크아웃된 워크스페이스 내부의 .js/.mjs/.cjs 파일만 허용됩니다.'
    default: ''
  check-winning-only:
    required: false
    description: 'true이면 구매 없이 기존 대기 Issue의 당첨 여부만 확인합니다.'
    default: 'false'
  telegram-bot-token:
    required: false
    description: '텔레그램 봇 토큰 (optional, 알림용)'
    default: ''
  telegram-chat-id:
    required: false
    description: '텔레그램 채팅 ID (optional, 알림용)'
    default: ''
runs:
  using: 'node24'
  main: 'dist/index.js'
