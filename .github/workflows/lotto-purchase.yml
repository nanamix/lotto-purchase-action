name: 로또 구매 (수동 + 스케줄)
on:
  schedule:
    # 매주 일요일 UTC 03:00 (한국 시간 일요일 12:00)
    # https://elmah.io/tools/cron-parser/
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      purchase-profile:
        description: '구매 방식 선택'
        required: true
        default: 'ai-recommendation'
        type: choice
        options:
          - ai-recommendation
          - auto-basic
          - manual-fixed
          - auto-plus-manual
          - gemini-recommendation
      ai-provider:
        description: 'AI 추천 provider (ai-recommendation에서 사용)'
        required: true
        default: 'copilot'
        type: choice
        options:
          - copilot
          - github
          - gemini
      game-count:
        description: '구매 게임 수 (1~5)'
        required: true
        default: '5'
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'

permissions:
  contents: read
  issues: write
  models: read

jobs:
  purchase:
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/playwright:v1.55.1-jammy
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install dependencies
        run: npm ci

      - name: Resolve purchase workflow
        id: purchase-workflow
        shell: bash
        run: |
          case "${{ inputs.purchase-profile || 'ai-recommendation' }}" in
            ai-recommendation)
              echo "workflow-file=custom-workflows/05-ai-recommendation.js" >> "$GITHUB_OUTPUT"
              ;;
            auto-basic)
              echo "workflow-file=custom-workflows/01-auto-basic.js" >> "$GITHUB_OUTPUT"
              ;;
            manual-fixed)
              echo "workflow-file=custom-workflows/02-manual-fixed-numbers.js" >> "$GITHUB_OUTPUT"
              ;;
            auto-plus-manual)
              echo "workflow-file=custom-workflows/03-auto-plus-manual.js" >> "$GITHUB_OUTPUT"
              ;;
            gemini-recommendation)
              echo "workflow-file=custom-workflows/04-gemini-recommendation.js" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unknown purchase-profile: ${{ inputs.purchase-profile }}" >&2
              exit 1
              ;;
          esac

      - name: Custom purchase workflow
        uses: ./
        with:
          dhlottery-id: ${{ secrets.DHLOTTERY_ID }}
          dhlottery-password: ${{ secrets.DHLOTTERY_PASSWORD }}
          github-token: ${{ github.token }}
          telegram-bot-token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          telegram-chat-id: ${{ secrets.TELEGRAM_CHAT_ID }}
          game-count: ${{ inputs.game-count || '5' }}
          workflow-file: ${{ steps.purchase-workflow.outputs.workflow-file }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          AI_PROVIDER: ${{ inputs.ai-provider || 'copilot' }}
          AI_GAME_COUNT: ${{ inputs.game-count || '5' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
