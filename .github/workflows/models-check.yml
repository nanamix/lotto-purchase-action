name: GitHub Models Check

on:
  workflow_dispatch:
    inputs:
      custom-model:
        description: '추가로 확인할 모델 ID (선택, 예: openai/gpt-5)'
        required: false
        default: ''

permissions:
  contents: read
  models: read

jobs:
  check-default-models:
    name: Check ${{ matrix.model }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        model:
          - openai/gpt-5
          - openai/gpt-5-mini
          - openai/gpt-5-chat
          - openai/gpt-5-nano
          - openai/gpt-4.1
          - openai/gpt-4o
    steps:
      - name: Call GitHub Models
        env:
          GITHUB_TOKEN: ${{ github.token }}
          MODEL: ${{ matrix.model }}
        run: |
          set -euo pipefail

          body="$(mktemp)"
          response="$(mktemp)"

          jq -n --arg model "$MODEL" \
            '{
              model: $model,
              messages: [
                {
                  role: "user",
                  content: "Return exactly OK."
                }
              ],
              max_tokens: 20
            }' > "$body"

          status="$(
            curl -sS -o "$response" -w "%{http_code}" \
              "https://models.github.ai/inference/chat/completions" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              --data-binary @"$body"
          )"

          echo "model=$MODEL"
          echo "status=$status"
          echo "response=$(jq -c '.choices[0].message.content // .message // .error // .' "$response" 2>/dev/null || head -c 500 "$response")"

          if [ "$status" != "200" ]; then
            exit 1
          fi

  check-custom-model:
    name: Check custom model
    runs-on: ubuntu-latest
    if: ${{ inputs.custom-model != '' }}
    steps:
      - name: Call GitHub Models
        env:
          GITHUB_TOKEN: ${{ github.token }}
          MODEL: ${{ inputs.custom-model }}
        run: |
          set -euo pipefail

          body="$(mktemp)"
          response="$(mktemp)"

          jq -n --arg model "$MODEL" \
            '{
              model: $model,
              messages: [
                {
                  role: "user",
                  content: "Return exactly OK."
                }
              ],
              max_tokens: 20
            }' > "$body"

          status="$(
            curl -sS -o "$response" -w "%{http_code}" \
              "https://models.github.ai/inference/chat/completions" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              --data-binary @"$body"
          )"

          echo "model=$MODEL"
          echo "status=$status"
          echo "response=$(jq -c '.choices[0].message.content // .message // .error // .' "$response" 2>/dev/null || head -c 500 "$response")"

          if [ "$status" != "200" ]; then
            exit 1
          fi
